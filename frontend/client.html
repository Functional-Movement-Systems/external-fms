<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Symmio Partner API — Reference Implementation</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>S</text></svg>">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://unpkg.com/video.js@8.23.9/dist/video-js.css" rel="stylesheet" />
    <script src="https://unpkg.com/video.js@8.23.9/dist/video.min.js"></script>
</head>
<body class="bg-light">
<div class="container py-4" style="max-width: 800px;">

    <h1 class="mb-1">Symmio Partner API</h1>
    <p class="text-muted mb-4">Reference implementation — assessment walkthrough</p>

    <div id="alerts"></div>

    <!-- ── Step 1: Create Assessment ── -->
    <div class="card mb-3" id="step-create">
        <div class="card-body">
            <h5 class="card-title">Step 1: Create Assessment</h5>
            <div class="row g-3">
                <div class="col-sm-6">
                    <label class="form-label">Type</label>
                    <div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="assessmentType" id="typeRisk" value="risk" checked>
                            <label class="form-check-label" for="typeRisk">MSK Risk</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="assessmentType" id="typeHealth" value="health">
                            <label class="form-check-label" for="typeHealth">MSK Health</label>
                        </div>
                    </div>
                </div>
                <div class="col-6 col-sm-3">
                    <label class="form-label" for="langSelect">Language</label>
                    <select class="form-select" id="langSelect">
                        <option value="en">English</option>
                        <option value="de">German</option>
                        <option value="es">Spanish</option>
                        <option value="it">Italian</option>
                        <option value="ja">Japanese</option>
                        <option value="ko">Korean</option>
                        <option value="el">Greek</option>
                        <option value="bs">Bosnian</option>
                    </select>
                </div>
                <div class="col-4 col-sm-2">
                    <label class="form-label">Age</label>
                    <input type="number" class="form-control" id="userAge" value="35" min="1">
                </div>
                <div class="col-8 col-sm-4">
                    <label class="form-label">Biological Sex</label>
                    <div class="pt-1">
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="userSex" id="sexFemale" value="true" checked>
                            <label class="form-check-label" for="sexFemale">Female</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="userSex" id="sexMale" value="false">
                            <label class="form-check-label" for="sexMale">Male</label>
                        </div>
                    </div>
                </div>
            </div>
            <button class="btn btn-primary mt-3" onclick="createAssessment()">Create Assessment</button>
        </div>
    </div>

    <!-- ── Step 2: Progress & Questions ── -->
    <div class="card mb-3 d-none" id="step-questions">
        <div class="card-body">
            <div class="d-flex justify-content-between align-items-start mb-2">
                <div>
                    <h5 class="card-title mb-1" id="groupTitle">Group: —</h5>
                    <small class="text-muted" id="progressText">Progress: 0 / 0</small>
                </div>
                <span class="badge bg-info fs-6" id="statusBadge">in_progress</span>
            </div>
            <hr>
            <div id="questionsContainer"></div>
            <button class="btn btn-success mt-3 d-none" id="btnSubmit" onclick="submitGroup()">Submit Group</button>
        </div>
    </div>

    <!-- ── Step 3: Score ── -->
    <div class="card mb-3 d-none" id="step-score">
        <div class="card-body">
            <h5 class="card-title">Assessment Complete</h5>
            <div id="scoreContainer"></div>
            <button class="btn btn-outline-secondary mt-3" onclick="resetAll()">Start Over</button>
        </div>
    </div>

    <!-- ── Debug: Raw JSON ── -->
    <div class="card mb-3 d-none" id="step-raw">
        <div class="card-body">
            <h5 class="card-title">Raw Response</h5>
            <pre class="bg-dark text-light p-3 rounded mb-0" id="rawJson" style="font-size: 0.8rem; overflow-x: auto;"></pre>
        </div>
    </div>

</div>

<script>
// ── Utility ──

const PROXY = "http://localhost:3000";
let state = {};

function showAlert(message, type) {
    const container = document.getElementById("alerts");
    const div = document.createElement("div");
    div.className = `alert alert-${type} alert-dismissible fade show`;
    div.innerHTML = `${message}<button type="button" class="btn-close" data-bs-dismiss="alert"></button>`;
    container.appendChild(div);
    setTimeout(() => div.remove(), 8000);
}

function show(id) { document.getElementById(id).classList.remove("d-none"); }
function hide(id) { document.getElementById(id).classList.add("d-none"); }

async function api(method, path, body) {
    const url = `${PROXY}${path}`;
    const opts = { method, headers: { "Content-Type": "application/json" } };
    if (body !== undefined) opts.body = JSON.stringify(body);
    const res = await fetch(url, opts);
    return res;
}

function renderRaw(data) {
    document.getElementById("rawJson").textContent = JSON.stringify(data, null, 2);
    show("step-raw");
}

// ── Assessment Flow ──

async function createAssessment() {
    const type = document.querySelector('input[name="assessmentType"]:checked').value;
    const age = parseInt(document.getElementById("userAge").value);
    const isFemale = document.querySelector('input[name="userSex"]:checked').value === "true";
    const language = document.getElementById("langSelect").value;

    if (!age || age < 1) { showAlert("Please enter a valid age.", "warning"); return; }

    state.language = language;
    const res = await api("POST", "/create-assessment", { type, userInfo: { age, isFemale }, language });
    const data = await res.json();

    if (!res.ok) { showAlert(data.message || "Failed to create assessment.", "danger"); return; }

    state = { assessmentId: data.assessmentId, answers: {} };
    renderRaw(data);
    handleAssessmentResponse(data);
}

function handleAssessmentResponse(data) {
    state.completedGroups = data.completedGroups || [];
    state.requiredGroups = data.requiredGroups || [];
    state.nextGroupId = data.nextGroup?.groupId;
    state.status = data.status;

    if (data.status === "complete") {
        showScore(data.currentMskScore);
        return;
    }

    if (data.status === "in_progress" || data.status === "retest_in_progress") {
        showGroup(data);
    }
}

// ── Question Rendering ──

function showGroup(data) {
    const group = data.nextGroup;
    const questions = group.questions.questions || [];

    document.getElementById("groupTitle").textContent = `Group: ${group.groupName} (${group.groupId})`;
    document.getElementById("progressText").textContent =
        `Progress: ${data.completedGroups.length} / ${data.requiredGroups.length}`;
    document.getElementById("statusBadge").textContent = data.status;

    const container = document.getElementById("questionsContainer");
    container.innerHTML = "";

    const desc = group.questions.description;
    if (desc) {
        if (desc.header) {
            const h = document.createElement("h6");
            h.className = "text-muted mb-1";
            h.textContent = desc.header;
            container.appendChild(h);
        }
        if (desc.content) {
            const p = document.createElement("p");
            p.className = "text-muted small mb-3";
            p.textContent = desc.content;
            container.appendChild(p);
        }
        if (desc.note) {
            const note = document.createElement("div");
            note.className = "alert alert-info py-2 small mb-3";
            note.textContent = desc.note;
            container.appendChild(note);
        }
    }

    for (const q of questions) {
        const wrapper = document.createElement("div");
        wrapper.className = "mb-3 question-row";
        wrapper.dataset.questionId = q.questionId;
        if (q.showWhen || q.skipWhen) wrapper.classList.add("conditional-question");

        const label = document.createElement("label");
        label.className = "form-label";
        label.textContent = q.questionAbbr ? `${q.questionAbbr} — ${q.questionText}` : q.questionText;
        if (q.answerUnits) label.textContent += ` (${q.answerUnits})`;
        wrapper.appendChild(label);

        if (q.instructions && q.instructions.length > 0) {
            const list = document.createElement("ol");
            list.className = "mb-2 small text-muted ps-3";
            for (const inst of q.instructions) {
                const li = document.createElement("li");
                li.textContent = inst;
                list.appendChild(li);
            }
            wrapper.appendChild(list);
        }

        if (q.showWhen) {
            const hint = document.createElement("small");
            hint.className = "text-muted d-block mb-1";
            const conditions = q.showWhen.map(c => `${c.matchQuestionId} = ${c.matchQuestionAnswerId}`).join(" OR ");
            hint.textContent = `Shown when: ${conditions}`;
            wrapper.appendChild(hint);
        }

        if (q.skipWhen) {
            const hint = document.createElement("small");
            hint.className = "text-muted d-block mb-1";
            const conditions = q.skipWhen.map(c => `${c.matchQuestionId} = ${c.matchQuestionAnswerId}`).join(" OR ");
            hint.textContent = `Skipped when: ${conditions}`;
            wrapper.appendChild(hint);
        }

        const input = renderInput(q);
        wrapper.appendChild(input);

        if (q.videoId) {
            const videoWrapper = document.createElement("div");
            videoWrapper.className = "mt-2 vid-wrapper";
            videoWrapper.dataset.videoId = q.videoId;
            const vid = document.createElement("video");
            vid.className = "video-js vjs-default-skin w-100 rounded";
            vid.style.maxWidth = "400px";
            const source = document.createElement("source");
            source.src = `https://cdn.jwplayer.com/manifests/${q.videoId}.m3u8`;
            source.type = "application/x-mpegURL";
            vid.appendChild(source);
            videoWrapper.appendChild(vid);
            wrapper.appendChild(videoWrapper);
        }

        container.appendChild(wrapper);
    }

    initVideos();
    connectPainScales();
    applyConditionals(questions);
    document.getElementById("btnSubmit").classList.remove("d-none");
    hide("step-create");
    show("step-questions");
    show("step-score");
    hide("step-score");
}

function renderInput(q) {
    const div = document.createElement("div");

    switch (q.answerFormat) {
        case "OPTIONS": {
            for (const opt of q.answerOptions || []) {
                const inner = document.createElement("div");
                inner.className = "form-check";
                inner.innerHTML = `
                    <input class="form-check-input" type="radio"
                        name="q_${q.questionId}" value="${opt.answerId}"
                        data-question="${q.questionId}" data-field="answerId">
                    <label class="form-check-label">${opt.answerText}</label>`;
                div.appendChild(inner);
            }
            break;
        }
        case "MULTIPLE_CHOICE": {
            for (const opt of q.answerOptions || []) {
                const inner = document.createElement("div");
                inner.className = "form-check";
                inner.innerHTML = `
                    <input class="form-check-input" type="checkbox"
                        value="${opt.answerId}"
                        data-question="${q.questionId}" data-field="answerResponse" data-multi="true">
                    <label class="form-check-label">${opt.answerText}</label>`;
                div.appendChild(inner);
            }
            break;
        }
        case "INTEGER": {
            if (q.fieldLabel) {
                const lbl = document.createElement("span");
                lbl.className = "badge bg-secondary me-1";
                lbl.textContent = q.fieldLabel;
                div.appendChild(lbl);
            }
            const input = document.createElement("input");
            input.type = "number";
            input.className = "form-control";
            input.style.maxWidth = "200px";
            if (q.integerMin !== undefined) input.min = q.integerMin;
            if (q.integerMax !== undefined) input.max = q.integerMax;
            input.dataset.question = q.questionId;
            input.dataset.field = "answerResponse";
            if (q.integerMin !== undefined && q.integerMax !== undefined) {
                input.placeholder = `${q.integerMin} – ${q.integerMax}`;
            } else if (q.integerMin !== undefined) {
                input.placeholder = `Min: ${q.integerMin}`;
            }
            div.appendChild(input);
            break;
        }
        case "DECIMAL": {
            if (q.fieldLabel) {
                const lbl = document.createElement("span");
                lbl.className = "badge bg-secondary me-1";
                lbl.textContent = q.fieldLabel;
                div.appendChild(lbl);
            }
            const input = document.createElement("input");
            input.type = "text";
            input.className = "form-control";
            input.style.maxWidth = "200px";
            input.inputMode = "decimal";
            input.dataset.question = q.questionId;
            input.dataset.field = "answerResponse";
            div.appendChild(input);
            break;
        }
        case "TIME": {
            const input = document.createElement("input");
            input.type = "time";
            input.className = "form-control";
            input.style.maxWidth = "200px";
            input.dataset.question = q.questionId;
            input.dataset.field = "answerResponse";
            div.appendChild(input);
            break;
        }
        case "MULTIPLE_CHOICE_PAIN_AREAS": {
            div.dataset.painAreas = "true";
            for (const opt of q.answerOptions || []) {
                const inner = document.createElement("div");
                inner.className = "form-check";
                inner.innerHTML = `
                    <input class="form-check-input pain-area-cb" type="checkbox"
                        value="${opt.answerId}" data-area="${opt.answerId}">
                    <label class="form-check-label">${opt.answerText}</label>`;
                div.appendChild(inner);
            }
            break;
        }
        case "MULTIPLE_PAIN_SCALE": {
            div.dataset.painScale = "true";
            div.dataset.question = q.questionId;
            const msg = document.createElement("p");
            msg.className = "text-muted mb-0";
            msg.textContent = "Select pain areas above to rate each one.";
            div.appendChild(msg);
            break;
        }
        default: {
            div.textContent = `Unknown format: ${q.answerFormat}`;
        }
    }
    return div;
}

// ── Pain Scale Integration ──

function connectPainScales() {
    const areasWrapper = document.querySelector("[data-pain-areas]");
    if (!areasWrapper) return;

    document.querySelectorAll("[data-pain-scale]").forEach(scaleDiv => {

        const areaOptions = areasWrapper.querySelectorAll(".pain-area-cb");

        function rebuildScale() {
            const checked = areasWrapper.querySelectorAll(".pain-area-cb:checked");
            const msg = scaleDiv.querySelector("p.text-muted");

            scaleDiv.querySelectorAll(".pain-slider-row").forEach(el => el.remove());

            if (checked.length === 0) {
                if (msg) msg.classList.remove("d-none");
                return;
            }
            if (msg) msg.classList.add("d-none");

            checked.forEach(cb => {
                const area = cb.value;
                const row = document.createElement("div");
                row.className = "pain-slider-row mb-2 d-flex align-items-center gap-2";
                row.innerHTML = `
                    <label class="form-label mb-0" style="min-width:130px">${area}</label>
                    <input type="range" class="form-range pain-scale-val" min="0" max="100" value="50"
                        style="max-width:120px" data-area="${area}">
                    <span class="pain-scale-display badge bg-secondary" style="min-width:32px">50</span>
                    <input type="hidden" class="pain-scale-hidden" data-area="${area}" value="50">`;
                scaleDiv.appendChild(row);
            });

            scaleDiv.querySelectorAll(".pain-scale-val").forEach(slider => {
                slider.addEventListener("input", function () {
                    const display = this.parentElement.querySelector(".pain-scale-display");
                    const hidden = this.parentElement.querySelector(".pain-scale-hidden");
                    if (display) display.textContent = this.value;
                    if (hidden) hidden.value = this.value;
                });
            });
        }

        areaOptions.forEach(cb => cb.addEventListener("change", rebuildScale));
        rebuildScale();
    });
}

// ── Video Player ──

function initVideos() {
    document.querySelectorAll(".vid-wrapper .video-js").forEach(el => {
        if (el.player) return;
        const id = "vjs-" + Math.random().toString(36).slice(2, 9);
        el.id = id;
        el.player = videojs(el, {
            controls: true,
            preload: "metadata",
            html5: { nativeAudioTracks: false, nativeVideoTracks: false },
        });
    });
}

// ── Response Collection & Submission ──

function collectResponses() {
    const responses = [];
    const rows = document.querySelectorAll(".question-row:not(.d-none)");

    for (const row of rows) {
        const qid = row.dataset.questionId;

        const radio = row.querySelector('input[type="radio"]:checked');
        if (radio) {
            responses.push({ questionId: qid, answerId: radio.value });
            continue;
        }

        const painAreas = row.querySelectorAll('.pain-area-cb:checked');
        if (painAreas.length > 0) {
            const entries = Array.from(painAreas).map(cb => ( { [cb.value]: "FRONT" } ));
            responses.push({ questionId: qid, answerResponse: JSON.stringify(entries) });
            continue;
        }

        const checkboxes = row.querySelectorAll('input[type="checkbox"]:checked');
        if (checkboxes.length > 0) {
            const values = Array.from(checkboxes).map(cb => cb.value).join(",");
            responses.push({ questionId: qid, answerResponse: values });
            continue;
        }

        const painScale = row.querySelector("[data-pain-scale]");
        if (painScale) {
            const entries = [];
            const sliders = painScale.querySelectorAll(".pain-scale-hidden");
            sliders.forEach(h => {
                const area = h.dataset.area;
                const value = parseInt(h.value);
                if (value > 0) {
                    entries.push({ area, value, direction: "FRONT" });
                }
            });
            if (entries.length === 0) {
                showAlert(`Set at least one pain scale value for ${qid}.`, "warning");
                return null;
            }
            responses.push({ questionId: qid, answerResponse: JSON.stringify(entries) });
            continue;
        }

        const input = row.querySelector("input, textarea");
        if (input && input.value) {
            responses.push({ questionId: qid, answerResponse: input.value });
            continue;
        }

        const isOptional = row.querySelector(".is-optional");
        if (!isOptional) {
            showAlert(`Missing answer for ${qid}.`, "warning");
            return null;
        }
    }

    return responses;
}

async function submitGroup() {
    const responses = collectResponses();
    if (!responses) return;

    const groupId = state.nextGroupId;
    const body = {
        assessmentId: state.assessmentId,
        groupId,
        questionResponses: responses,
        language: state.language,
    };
    console.log("[SUBMIT] Sending:", JSON.stringify(body, null, 2));

    const res = await api("POST", "/submit-group", body);
    let data;
    try {
        data = await res.json();
    } catch {
        const text = await res.text();
        console.error("[SUBMIT] Non-JSON response:", text);
        showAlert(`Server returned ${res.status}: ${text.slice(0, 200)}`, "danger");
        return;
    }

    console.log("[SUBMIT] Response:", res.status, JSON.stringify(data));

    if (!res.ok) {
        const msg = data.message || (data.errors ? data.errors.join(", ") : null) || "Submission failed.";
        showAlert(msg, "danger");
        return;
    }

    renderRaw(data);
    handleAssessmentResponse(data);
}

// ── Conditionals (showWhen / skipWhen) ──

function applyConditionals(questions) {
    const allRows = document.querySelectorAll(".question-row");

    function updateVisibility() {
        for (const row of allRows) {
            if (!row.classList.contains("conditional-question")) continue;
            const qid = row.dataset.questionId;
            const q = questions.find(x => x.questionId === qid);
            if (!q) continue;

            let visible = true;

            if (q.showWhen && q.showWhen.length > 0) {
                visible = q.showWhen.some(cond => {
                    const input = document.querySelector(
                        `input[name="q_${cond.matchQuestionId}"]:checked`
                    );
                    return input && input.value === cond.matchQuestionAnswerId;
                });
            }

            if (visible && q.skipWhen && q.skipWhen.length > 0) {
                visible = !q.skipWhen.some(cond => {
                    const input = document.querySelector(
                        `input[name="q_${cond.matchQuestionId}"]:checked`
                    );
                    return input && input.value === cond.matchQuestionAnswerId;
                });
            }

            row.classList.toggle("d-none", !visible);
        }
    }

    document.querySelectorAll(".question-row input[type=radio]").forEach(el => {
        el.addEventListener("change", updateVisibility);
    });

    updateVisibility();
}

// ── Score & Reset ──

function showScore(score) {
    hide("step-questions");
    document.getElementById("btnSubmit").classList.add("d-none");
    show("step-score");

    const container = document.getElementById("scoreContainer");
    container.innerHTML = `
        <div class="row g-3 mb-3">
            <div class="col-md-4">
                <div class="border rounded p-3 text-center">
                    <div class="text-muted small">Overall Score</div>
                    <div class="display-6 fw-bold">${score.percentage ?? "—"}</div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="border rounded p-3 text-center">
                    <div class="text-muted small">Risk Factor</div>
                    <div class="display-6 fw-bold">${score.riskFactor?.riskCode ?? "—"}</div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="border rounded p-3 text-center">
                    <div class="text-muted small">Movement Score</div>
                    <div class="display-6 fw-bold">${score.movementScore?.percentage ?? "—"}</div>
                </div>
            </div>
        </div>
        ${score.errors?.length ? `
        <div class="alert alert-warning">
            <strong>Score errors:</strong>
            <ul class="mb-0 mt-1">${score.errors.map(e => `<li>${e}</li>`).join("")}</ul>
        </div>` : ""}`;
}

function resetAll() {
    state = {};
    hide("step-questions");
    hide("step-score");
    hide("step-raw");
    show("step-create");
    document.getElementById("btnSubmit").classList.add("d-none");
    document.getElementById("questionsContainer").innerHTML = "";
    document.getElementById("alerts").innerHTML = "";
}
</script>
</body>
</html>
